services:
  # --- MinIO (Bronze + Gold object storage) ---
  empire_minio:
    image: minio/minio:latest
    container_name: empire_minio
    restart: unless-stopped
    ports:
      - "127.0.0.1:9001:9001"
      - "127.0.0.1:9002:9002"
    volumes:
      - /mnt/empire-data/minio:/data
      - ./docker/minio/entrypoint.sh:/entrypoint.sh:ro
    secrets:
      - minio_root_key
      - minio_root_secret
    entrypoint: /entrypoint.sh
    networks:
      empire_network:
        aliases:
          - minio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9001/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Dagster (orchestration — 3 services, shared image) ---
  empire_dagster_code:
    build:
      context: .
      dockerfile: docker/dagster/Dockerfile
    container_name: empire_dagster_code
    image: ftb-dagster:latest
    restart: unless-stopped
    entrypoint: /opt/dagster/home/entrypoint.sh
    command:
      - dagster
      - api
      - grpc
      - -h
      - "0.0.0.0"
      - -p
      - "4266"
      - -m
      - ftb.definitions
    volumes:
      - /mnt/empire-db/dagster:/opt/dagster/storage
      - ./docker/dagster/entrypoint.sh:/opt/dagster/home/entrypoint.sh:ro
    secrets:
      - dagster_pg_password
      - pg_forge_user
      - pg_forge_reader
      - ch_writer
      - ch_export_reader
      - ch_ops_reader
      - minio_bronze_key
      - minio_bronze_secret
      - tiingo_api_key
      - ch_empire_reader
      - minio_bronze_archive_key
      - minio_bronze_archive_secret
      - minio_gold_key
      - minio_gold_secret
    networks:
      - empire_network
    depends_on:
      empire_minio:
        condition: service_healthy

  empire_dagster_webserver:
    image: ftb-dagster:latest
    container_name: empire_dagster_webserver
    restart: unless-stopped
    entrypoint: /opt/dagster/home/entrypoint.sh
    command:
      - dagster-webserver
      - -h
      - "0.0.0.0"
      - -p
      - "3010"
      - -w
      - /opt/dagster/home/workspace.yaml
    ports:
      - "127.0.0.1:3010:3010"
    volumes:
      - /mnt/empire-db/dagster:/opt/dagster/storage
      - ./docker/dagster/entrypoint.sh:/opt/dagster/home/entrypoint.sh:ro
    secrets:
      - dagster_pg_password
    networks:
      - empire_network
    depends_on:
      - empire_dagster_code

  empire_dagster_daemon:
    image: ftb-dagster:latest
    container_name: empire_dagster_daemon
    restart: unless-stopped
    entrypoint: /opt/dagster/home/entrypoint.sh
    command:
      - dagster-daemon
      - run
      - -w
      - /opt/dagster/home/workspace.yaml
    volumes:
      - /mnt/empire-db/dagster:/opt/dagster/storage
      - ./docker/dagster/entrypoint.sh:/opt/dagster/home/entrypoint.sh:ro
    secrets:
      - dagster_pg_password
    networks:
      - empire_network
    depends_on:
      - empire_dagster_code

secrets:
  minio_root_key:
    file: ./secrets/minio_root_key.txt
  minio_root_secret:
    file: ./secrets/minio_root_secret.txt
  dagster_pg_password:
    file: ./secrets/dagster_pg_password.txt
  pg_forge_user:
    file: ./secrets/pg_forge_user.txt
  pg_forge_reader:
    file: ./secrets/pg_forge_reader.txt
  ch_writer:
    file: ./secrets/ch_writer.txt
  ch_export_reader:
    file: ./secrets/ch_export_reader.txt
  ch_ops_reader:
    file: ./secrets/ch_ops_reader.txt
  minio_bronze_key:
    file: ./secrets/minio_bronze_key.txt
  minio_bronze_secret:
    file: ./secrets/minio_bronze_secret.txt
  tiingo_api_key:
    file: ./secrets/external_apis/tiingo.txt
  ch_empire_reader:
    file: ./secrets/ch_empire_reader.txt
  minio_bronze_archive_key:
    file: ./secrets/minio_bronze_archive_key.txt
  minio_bronze_archive_secret:
    file: ./secrets/minio_bronze_archive_secret.txt
  minio_gold_key:
    file: ./secrets/minio_gold_key.txt
  minio_gold_secret:
    file: ./secrets/minio_gold_secret.txt

networks:
  empire_network:
    external: true
