services:
  forge_db:
    image: timescale/timescaledb:latest-pg16
    container_name: empire_forge_db
    restart: unless-stopped
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: empire_forge_db
      POSTGRES_USER: forge_admin
      POSTGRES_PASSWORD: ${FORGE_DB_PASSWORD:-qfCTPwAoGhhwKxIJuGX/fHhnaeyLTjqT6R+Poi0XaKo=}
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    volumes:
      - forge_data:/var/lib/postgresql/data
    networks:
      - empire_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge_admin -d empire_forge_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  empire_clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: empire_clickhouse
    restart: unless-stopped
    ports:
      - "127.0.0.1:8123:8123"
      - "127.0.0.1:9000:9000"
    volumes:
      - /mnt/empire-db/clickhouse/data:/var/lib/clickhouse
      - /mnt/empire-db/clickhouse/logs:/var/log/clickhouse-server
      - ./docker/clickhouse/config.xml:/etc/clickhouse-server/config.d/custom.xml:ro
      - ./docker/clickhouse/users.xml:/etc/clickhouse-server/users.d/custom.xml:ro
    networks:
      - empire_network
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

volumes:
  forge_data:

networks:
  empire_network:
